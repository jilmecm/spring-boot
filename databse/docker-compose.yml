version: '3.8'
services:
  mysql:
    image: 'mysql:latest'
    container_name: mysql_db
    restart: unless-stopped
    environment:
      - 'MYSQL_DATABASE=prueba'
      - 'MYSQL_PASSWORD=prueba'
      - 'MYSQL_ROOT_PASSWORD=rootpassword'
      - 'MYSQL_USER=jilme'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
    driver: local